<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f0f12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Sablia" />

    <title>Sablia — Intégrez Claude AI dans votre CRM</title>
    <meta name="author" content="Sablia" />

    <!-- Structured Data (JSON-LD) — site-wide ProfessionalService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "@id": "https://sablia.io/#organization",
      "name": "Sablia",
      "alternateName": "Sablia — Agence d'intégration Claude AI × CRM",
      "url": "https://sablia.io",
      "logo": "https://sablia.io/logo.svg",
      "image": "https://sablia.io/og-image-home.png",
      "slogan": "Exploitez 100 % du potentiel de votre CRM.",
      "description": "Agence française d'intégration de Claude (Anthropic) dans les CRM et les processus commerciaux des PME : dashboards intelligents, nurturing automatisé, analyse de calls commerciaux. Premier workflow en production sous 30 jours.",
      "email": "contact@sablia.io",
      "founder": {
        "@type": "Person",
        "name": "Brice Gachadoat",
        "url": "https://www.linkedin.com/in/brice-gachadoat-03942795/"
      },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "60 rue François Ier",
        "postalCode": "75008",
        "addressLocality": "Paris",
        "addressCountry": "FR"
      },
      "serviceType": [
        "Intégration Claude AI dans le CRM",
        "Automatisation des processus commerciaux",
        "Analyse de calls commerciaux par IA",
        "Conseil et formation IA"
      ],
      "areaServed": {
        "@type": "Country",
        "name": "France"
      },
      "knowsAbout": [
        "Claude AI",
        "Anthropic",
        "Intégration de l'IA en entreprise",
        "Salesforce",
        "HubSpot",
        "Pipedrive",
        "Zoho CRM",
        "Automatisation CRM",
        "Nurturing automatisé",
        "Agents IA",
        "n8n"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Intégration de Claude AI dans votre CRM",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Dashboards intelligents",
              "description": "Claude lit votre pipeline et produit un brief commercial hebdomadaire : opportunités à risque, leads chauds, actions prioritaires."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Nurturing automatisé",
              "description": "Séquences d'emails personnalisées déclenchées par les signaux du pipeline, calibrées sur le ton de votre marque."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Analyse de calls commerciaux",
              "description": "Claude transcrit, résume et enrichit chaque appel dans votre CRM : objections clés, prochaines étapes, scoring."
            }
          }
        ]
      }
    }
    </script>

    <!-- DNS Prefetch for External Services -->
    <link rel="dns-prefetch" href="https://calendly.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
